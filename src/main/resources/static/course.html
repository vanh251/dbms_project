<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Chi tiết khóa học – LearnHub">
    <title>Chi tiết khóa học – LearnHub</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- Navbar -->
<nav class="navbar">
    <a class="logo" href="index.html">Learn<span>Hub</span></a>
    <div class="nav-links">
        <a href="index.html" class="hide-mobile">Trang chủ</a>
        <a href="courses.html" class="hide-mobile">Khóa học</a>
    </div>
    <div id="navAuth"></div>
</nav>

<div class="container">
    <div class="course-detail-layout">
        <!-- Main Content -->
        <div class="course-info">
            <div id="courseDetail">
                <div class="loading-wrap"><div class="spinner"></div></div>
            </div>
        </div>

        <!-- Sidebar -->
        <div>
            <div class="course-card-sidebar" id="courseSidebar">
                <div class="loading-wrap"><div class="spinner"></div></div>
            </div>
        </div>
    </div>
</div>

<!-- Footer -->
<footer class="footer">
    <div class="footer-brand">Learn<span>Hub</span></div>
    <p>Nền tảng học trực tuyến chất lượng cao &bull; &copy; 2026 LearnHub</p>
</footer>

<!-- Buy Course Modal -->
<div class="modal-overlay" id="buyModalOverlay">
    <div class="modal">
        <div class="modal-header">
            <h3>Thanh toán khóa học</h3>
            <button class="modal-close" onclick="closeBuyModal()">&times;</button>
        </div>
        <div id="buyModalBody" style="padding-top:1rem">
            <!-- Filled by main.js -->
        </div>
    </div>
</div>

<script src="js/api.js"></script>
<script src="js/main.js"></script>
</body>
</html>
