<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Trang quản trị LearnHub">
    <title>Admin Panel – LearnHub</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- Admin Navbar -->
<nav class="navbar">
    <a class="logo" href="index.html">Learn<span>Hub</span> <span style="font-size:0.75rem;background:#4f46e5;color:#fff;padding:2px 8px;border-radius:12px;margin-left:6px">Admin</span></a>
    <div class="nav-links">
        <span style="color:#64748b;font-size:0.9rem">👤 <span id="adminUsername"></span></span>
        <a href="index.html" class="btn btn-sm btn-outline hide-mobile">Xem site</a>
        <button class="btn btn-sm btn-danger" onclick="logout()">Đăng xuất</button>
    </div>
</nav>

<!-- Admin Layout -->
<div class="admin-layout">

    <!-- Sidebar -->
    <aside class="admin-sidebar">
        <div class="sidebar-logo">⚙️ Quản trị</div>
        <nav class="sidebar-nav">
            <a data-section="courses" onclick="showSection('courses')">📚 Khóa học</a>
            <a data-section="users" onclick="showSection('users')">👥 Người dùng</a>
            <a data-section="categories" onclick="showSection('categories')">📂 Danh mục</a>
        </nav>
    </aside>

    <!-- Main Content -->
    <main class="admin-main">

        <!-- COURSES SECTION -->
        <div id="section-courses" class="admin-section">
            <div class="admin-header">
                <h2>📚 Quản lý khóa học</h2>
                <button class="btn btn-primary" onclick="openCreateCourse()">➕ Thêm khóa học</button>
            </div>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Tên khóa học</th>
                            <th>Danh mục</th>
                            <th>Giá</th>
                            <th>Trạng thái</th>
                            <th>Hành động</th>
                        </tr>
                    </thead>
                    <tbody id="coursesTable">
                        <tr><td colspan="6" style="text-align:center"><div class="spinner" style="margin:1rem auto"></div></td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- USERS SECTION -->
        <div id="section-users" class="admin-section">
            <div class="admin-header">
                <h2>👥 Quản lý người dùng & phân quyền</h2>
                <button class="btn btn-primary" onclick="loadAdminUsers()">🔄 Làm mới</button>
            </div>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Họ tên</th>
                            <th>Email</th>
                            <th>Nhóm</th>
                            <th>Hành động</th>
                        </tr>
                    </thead>
                    <tbody id="usersTable">
                        <tr><td colspan="5" style="text-align:center"><div class="spinner" style="margin:1rem auto"></div></td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- CATEGORIES SECTION -->
        <div id="section-categories" class="admin-section">
            <div class="admin-header">
                <h2>📂 Danh mục khóa học</h2>
                <button class="btn btn-primary" onclick="loadAdminCategories()">🔄 Làm mới</button>
            </div>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Tên danh mục</th>
                        </tr>
                    </thead>
                    <tbody id="categoriesTable">
                        <tr><td colspan="2" style="text-align:center"><div class="spinner" style="margin:1rem auto"></div></td></tr>
                    </tbody>
                </table>
            </div>
        </div>

    </main>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
    <div class="modal">
        <div class="modal-header">
            <h3 id="modalTitle">Modal</h3>
            <button class="modal-close" onclick="closeModal()">✕</button>
        </div>
        <div id="modalBody"></div>
    </div>
</div>

<script src="js/api.js"></script>
<script src="js/admin.js"></script>
</body>
</html>
